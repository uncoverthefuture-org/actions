name: Publish to NPM

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - master
    paths:
      - 'package.json'
      - 'yarn.lock'
      - 'src/**'
      - 'bin/**'

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get NPM credentials from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENVIRONMENT_SLUG }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --ignore-scripts

      - name: Build
        run: yarn build

      - name: Run tests
        run: yarn test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: $NPM_ACCESS_TOKEN
