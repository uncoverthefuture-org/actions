name: React Documentation

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions Project
        uses: actions/checkout@v4
        with:
          path: uactions-data

      - name: Checkout Uncover Docs Shell
        uses: actions/checkout@v4
        with:
          repository: uncoverthefuture-org/uncover-docs
          path: docs-ui
          token: ${{ secrets.PAT_TOKEN }}

      - name: Inject Target Data and Navigation Routs
        run: |
          # The UI Shell provides all react/vite boilerplate natively. We only overlay the project's unique data strings and mapping components.
          cp -r uactions-data/docs/src/data/* docs-ui/src/data/ || true
          cp -r uactions-data/docs/src/assets/* docs-ui/src/assets/ || true
          echo "Injection mapping completed."

      - name: Enable Corepack for Yarn
        run: corepack enable
        working-directory: docs-ui

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: docs-ui/yarn.lock

      - name: Install dependencies
        run: yarn install
        working-directory: docs-ui

      - name: Build documentation
        run: yarn build && cp dist/index.html dist/404.html
        working-directory: docs-ui

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-ui/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
